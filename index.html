<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Classical Guitar Score</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
</head>
<body>
    <header>
        <div class="overlay">
            <!-- 注册表单 -->
            <div id="register-form">
                <h1>Register</h1>
                <input type="text" id="reg-username" placeholder="Enter a username" required>
                <input type="password" id="reg-password" placeholder="Enter a password" required>
                <button onclick="register()">Register</button>
                <p>Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
            </div>

            <!-- 登录表单 -->
            <div id="login-form" style="display: none;">
                <h1>Login</h1>
                <input type="text" id="login-username" placeholder="Enter your username" required>
                <input type="password" id="login-password" placeholder="Enter your password" required>
                <button onclick="login()">Login</button>
                <p>Don't have an account? <a href="#" onclick="showRegister()">Register</a></p>
            </div>

            <!-- 下载链接 -->
            <div id="download-section" style="display: none;">
                <h1>Download Classical Guitar Score</h1>
                <a href="索尔幻想曲Op.30.pdf" target="_blank">Click Here to Download</a>
            </div>
        </div>
    </header>

    <script>
        // Firebase 配置代码
        const firebaseConfig = {
            apiKey: "AIzaSyBZVMwHNf2selc45IiYar2kg13nGZ28f4o",
            authDomain: "jerryguitar-c8dfb.firebaseapp.com",
            databaseURL: "https://jerryguitar-c8dfb-default-rtdb.firebaseio.com",
            projectId: "jerryguitar-c8dfb",
            storageBucket: "jerryguitar-c8dfb.appspot.com",
            messagingSenderId: "625843585019",
            appId: "1:625843585019:web:e8df8eda7c7d2ea8fd55e",
            measurementId: "G-J74SW9WQ4Q"
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function register() {
            const username = document.getElementById("reg-username").value;
            const password = document.getElementById("reg-password").value;

            if (username && password) {
                database.ref("users/" + username).set({
                    password: password
                }).then(() => {
                    alert("Registration successful! Please log in.");
                    showLogin();
                }).catch(error => alert("Error: " + error.message));
            } else {
                alert("Please enter both username and password!");
            }
        }

        function login() {
            const username = document.getElementById("login-username").value;
            const password = document.getElementById("login-password").value;

            database.ref("users/" + username).get().then(snapshot => {
                if (snapshot.exists()) {
                    const storedPassword = snapshot.val().password;
                    if (storedPassword === password) {
                        alert("Login successful!");
                        document.getElementById("register-form").style.display = "none";
                        document.getElementById("login-form").style.display = "none";
                        document.getElementById("download-section").style.display = "block";
                    } else {
                        alert("Incorrect password!");
                    }
                } else {
                    alert("User not found. Please register first!");
                }
            }).catch(error => alert("Error: " + error.message));
        }

        function showRegister() {
            document.getElementById("register-form").style.display = "block";
            document.getElementById("login-form").style.display = "none";
        }

        function showLogin() {
            document.getElementById("register-form").style.display = "none";
            document.getElementById("login-form").style.display = "block";
        }
    </script>
</body>
</html>
