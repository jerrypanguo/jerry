<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification & Download</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Firebase 脚本 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>
<body>
    <header>
        <div class="overlay">
            <!-- 注册表单 -->
            <div id="register-form">
                <h1>Register</h1>
                <input type="email" id="reg-email" placeholder="Enter your email" required>
                <input type="password" id="reg-password" placeholder="Enter your password" required>
                <button onclick="register()">Register</button>
                <p>Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
            </div>

            <!-- 登录表单 -->
            <div id="login-form" style="display: none;">
                <h1>Login</h1>
                <input type="email" id="login-email" placeholder="Enter your email" required>
                <input type="password" id="login-password" placeholder="Enter your password" required>
                <button onclick="login()">Login</button>
                <p>Don't have an account? <a href="#" onclick="showRegister()">Register</a></p>
            </div>

            <!-- 邮箱验证提示 -->
            <div id="verify-section" style="display: none;">
                <h1>Verify Your Email</h1>
                <p>A verification email has been sent. Please check your inbox and click the verification link.</p>
            </div>

            <!-- 下载链接 -->
            <div id="download-section" style="display: none;">
                <h1>Download Guitar Score</h1>
                <a href="索尔幻想曲Op.30.pdf" target="_blank">Click Here to Download</a>
            </div>
        </div>
    </header>

    <!-- Firebase 脚本 -->
    <script>
        // Firebase 配置代码 - 请替换为你自己的 API 配置信息
        const firebaseConfig = {
            apiKey: "你的有效API密钥",  // 替换为你的有效API密钥
            authDomain: "jerryguitar-c8dfb.firebaseapp.com",
            projectId: "jerryguitar-c8dfb",
            storageBucket: "jerryguitar-c8dfb.appspot.com",
            messagingSenderId: "625843585019",
            appId: "1:625843585019:web:e8df8eda7c7d2ea8fd55e",
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function register() {
            const email = document.getElementById("reg-email").value;
            const password = document.getElementById("reg-password").value;

            auth.createUserWithEmailAndPassword(email, password)
                .then(userCredential => {
                    const user = userCredential.user;
                    user.sendEmailVerification().then(() => {
                        alert("Verification email sent. Please check your inbox.");
                        showVerify();
                    });
                })
                .catch(error => {
                    alert("Error: " + error.message);
                });
        }

        function login() {
            const email = document.getElementById("login-email").value;
            const password = document.getElementById("login-password").value;

            auth.signInWithEmailAndPassword(email, password)
                .then(userCredential => {
                    const user = userCredential.user;
                    if (user.emailVerified) {
                        alert("Login successful!");
                        showDownload();
                    } else {
                        alert("Please verify your email first.");
                    }
                })
                .catch(error => {
                    alert("Error: " + error.message);
                });
        }

        function showRegister() {
            document.getElementById("register-form").style.display = "block";
            document.getElementById("login-form").style.display = "none";
            document.getElementById("verify-section").style.display = "none";
            document.getElementById("download-section").style.display = "none";
        }

        function showLogin() {
            document.getElementById("register-form").style.display = "none";
            document.getElementById("login-form").style.display = "block";
            document.getElementById("verify-section").style.display = "none";
            document.getElementById("download-section").style.display = "none";
        }

        function showVerify() {
            document.getElementById("register-form").style.display = "none";
            document.getElementById("verify-section").style.display = "block";
        }

        function showDownload() {
            document.getElementById("register-form").style.display = "none";
            document.getElementById("login-form").style.display = "none";
            document.getElementById("download-section").style.display = "block";
        }
    </script>
</body>
</html>
