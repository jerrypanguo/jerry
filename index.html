
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Classical Guitar Score</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        function register() {
            const regUsername = document.getElementById("reg-username").value;
            const regPassword = document.getElementById("reg-password").value;
            if (regUsername && regPassword) {
                localStorage.setItem(regUsername, regPassword);
                alert("Registration successful! Please log in.");
                showLogin();
            } else {
                alert("Please enter both username and password to register.");
            }
        }

        function login() {
            const loginUsername = document.getElementById("login-username").value;
            const loginPassword = document.getElementById("login-password").value;
            const storedPassword = localStorage.getItem(loginUsername);

            if (storedPassword && storedPassword === loginPassword) {
                alert("Login successful!");
                document.getElementById("login-form").style.display = "none";
                document.getElementById("download-section").style.display = "block";
            } else {
                alert("Incorrect username or password.");
            }
        }

        function showRegister() {
            document.getElementById("register-form").style.display = "block";
            document.getElementById("login-form").style.display = "none";
        }

        function showLogin() {
            document.getElementById("register-form").style.display = "none";
            document.getElementById("login-form").style.display = "block";
        }
    </script>
</head>
<body>
    <header>
        <div class="overlay">
            <!-- 注册表单 -->
            <div id="register-form">
                <h1>Register</h1>
                <input type="text" id="reg-username" placeholder="Choose a username" required>
                <input type="password" id="reg-password" placeholder="Choose a password" required>
                <button onclick="register()">Register</button>
                <p>Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
            </div>

            <!-- 登录表单 -->
            <div id="login-form" style="display: none;">
                <h1>Login</h1>
                <input type="text" id="login-username" placeholder="Enter your username" required>
                <input type="password" id="login-password" placeholder="Enter your password" required>
                <button onclick="login()">Login</button>
                <p>Don't have an account? <a href="#" onclick="showRegister()">Register</a></p>
            </div>

            <!-- 下载链接 -->
            <div id="download-section" style="display: none;">
                <h1>Download Classical Guitar Score</h1>
                <a href="索尔幻想曲Op.30.pdf" target="_blank">Click Here to Download</a>
            </div>
        </div>
    </header>
</body>
</html>
